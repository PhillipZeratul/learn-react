name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true

  build-web:
    name: Build Web
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install Dependencies
        run: bun install
      - name: Build Web
        run: VITE_PLATFORM=web bun run build
      - name: Zip Web Assets
        run: |
          cd dist
          zip -r ../web-build.zip .
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: web-build.zip
      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/liferpg"
          strip_components: 1

  build-android:
    name: Build Android Debug APK
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        
      - name: Install Dependencies
        run: bun install
        
      - name: Build Web Assets
        run: VITE_PLATFORM=capacitor bun run build
        
      - name: Sync Capacitor
        run: bunx cap sync android
        
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS App
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
          
      - name: Install Dependencies
        run: bun install
        
      - name: Build Web Assets
        run: VITE_PLATFORM=capacitor bun run build
        
      - name: Setup iOS Platform
        run: |
          npx cap add ios || echo "iOS platform already exists or failed to add"
          npx cap sync ios
          echo "Listing iOS directory structure:"
          ls -R ios || echo "ios directory not found"
          echo "Searching for workspaces:"
          find . -name "*.xcworkspace"
          
      - name: Build iOS App Bundle
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: Could not find .xcworkspace file"
            exit 1
          fi
          echo "Using workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build-ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build
            
      - name: Zip iOS App
        run: |
          cd build-ios/Build/Products/Debug-iphoneos
          zip -r ../../../../ios-app.zip App.app
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ios-app.zip

  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, macos-15-intel, ubuntu-22.04, windows-latest]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
          
      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || (matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '') }}
          
      - name: Install Dependencies
        run: bun install
        
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_PLATFORM: tauri
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target aarch64-apple-darwin' || (matrix.platform == 'macos-15-intel' && '--target x86_64-apple-darwin' || '') }}
